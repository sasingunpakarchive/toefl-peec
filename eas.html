<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEFL Online Test - Unified System</title>
    <style>
        :root { --primary: #2c3e50; --accent: #2980b9; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; line-height: 1.6; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        h1, h2 { color: var(--primary); border-bottom: 3px solid var(--accent); padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { background: var(--accent); color: white; border: none; padding: 15px 35px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: #1c5982; }
        .question-block { margin-bottom: 25px; padding: 15px; background: #fff; border: 1px solid #eee; border-radius: 10px; }
        .options-label { display: block; margin: 10px 0; padding: 10px; border: 1px solid #eee; border-radius: 5px; cursor: pointer; }
        .options-label:hover { background: #f0f7ff; }
        .passage { background: #fffbe6; padding: 25px; border-left: 5px solid #f1c40f; border-radius: 5px; margin-top: 40px; margin-bottom: 20px; font-size: 15px; max-height: 400px; overflow-y: scroll; border: 1px solid #ddd; line-height: 1.8; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); }
        .instruction { font-style: italic; color: #555; margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 5px; border-left: 4px solid var(--accent); }
        .status-bar { position: sticky; top: 0; background: white; padding: 10px 0; border-bottom: 2px solid #eee; z-index: 100; font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 20px; }
        /* Styling tambahan untuk box audio */
        .audio-box { background: #ebf5fb; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #aed6f1; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <!-- LOGIN PAGE -->
    <div id="login-page">
        <h1>TOEFL Online Test</h1>
        <p>Silahkan masukkan data diri. Sistem akan mencatat setiap aktivitas perpindahan jendela/tab.</p>
        <div class="input-group"><input type="text" id="name" placeholder="Nama Lengkap"></div>
        <div class="input-group"><input type="text" id="npm" placeholder="NPM"></div>
        <div class="input-group"><input type="text" id="class" placeholder="Kelas"></div>
        <button onclick="startExam()">Mulai Ujian</button>
    </div>

    <!-- EXAM PAGE -->
    <div id="exam-page" class="hidden">
        <div class="status-bar">
            <span id="display-info"></span>
        </div>
        <h2 id="section-title">Section Title</h2>
        <div id="exam-content"></div>
        <button id="next-btn" onclick="submitSection()" style="margin-top: 20px;">Submit & Lanjut</button>
    </div>
</div>

    function startExam() {
    const name = document.getElementById('name').value;
    const npm = document.getElementById('npm').value;
    const cls = document.getElementById('class').value;
    if (!name || !npm || !cls) return alert("Mohon lengkapi data login!");
    
    userData = { name, npm, className: cls };
    document.getElementById('display-info').innerText = `${name} (${npm}) - ${cls}`;
    document.getElementById('login-page').classList.add('hidden');
    document.getElementById('exam-page').classList.remove('hidden');
    
    renderSection();
    
    // TAMBAHKAN BARIS INI AGAR DETEKSI AKTIF
    setupSecurity(); 
}
    function renderSection() {
    const sec = examData[currentSectionIdx];
    document.getElementById('section-title').innerText = sec.title;
    
    let html = `<div class='instruction'>${sec.instr}</div>`;

    if (sec.audioUrl) {
        html += `
            <div class="audio-box" style="background: #fdfdfd; border: 2px solid #3498db; padding: 25px; border-radius: 15px; text-align: center; margin-bottom: 25px;">
                <div style="font-size: 35px; margin-bottom: 10px;">🎧</div>
                <strong style="font-size: 18px; color: #2c3e50;">Listening Section</strong><br>
                
                <audio id="listeningAudio">
                    <source src="${sec.audioUrl}" type="audio/mpeg">
                </audio>

                <div style="margin-top: 15px;">
                    <button type="button" id="btnPlay" onclick="startSecurePlay()" 
                        style="background-color: #3498db; color: white; padding: 12px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 16px;">
                        ▶️ Putar Audio
                    </button>
                </div>
                
                <p id="audio-msg" style="font-size: 12px; color: #e74c3c; margin-top: 10px; font-weight: bold;">
                    *Audio hanya dapat diputar 1x. Jangan merefresh halaman.
                </p>
            </div>
        `;
    }

    // Bagian render pertanyaan
    sec.questions.forEach((qObj, i) => {
        if (qObj.passage) html += `<div class='passage'>${qObj.passage}</div>`;
        const questionText = qObj.q ? `<strong>${qObj.q}</strong>` : `<strong>Question ${i+1}</strong>`;
        html += `<div class='question-block' style='margin-bottom: 20px;'><p>${questionText}</p>`;
        qObj.o.forEach((opt, oi) => {
            const val = String.fromCharCode(65 + oi);
            html += `<label style='display: block; margin-bottom: 5px; cursor: pointer;'>
                        <input type='radio' name='q${i}' value='${val}'> ${opt}
                     </label>`;
        });
        html += `</div>`;
    });
    
    document.getElementById('exam-content').innerHTML = html;
    window.scrollTo(0,0);
}

function startSecurePlay() {
    const audio = document.getElementById('listeningAudio');
    const btn = document.getElementById('btnPlay');
    const msg = document.getElementById('audio-msg');

    if (audio) {
        // 1. Paksa browser memuat ulang source untuk menghindari error "Not Found"
        audio.load(); 

        // 2. Kunci fitur 'seeking' (mencegah audio dipercepat/diseret)
        audio.onseeking = function() {
            audio.currentTime = lastPlayedTime;
        };
        let lastPlayedTime = 0;
        audio.ontimeupdate = function() {
            if (!audio.seeking) {
                lastPlayedTime = audio.currentTime;
            }
        };

        audio.play().then(() => {
            btn.disabled = true;
            btn.innerHTML = "⌛ Audio Sedang Diputar...";
            btn.style.backgroundColor = "#bdc3c7";
            btn.style.cursor = "not-allowed";
            msg.innerText = "⚠️ Audio sedang berjalan. Durasi terkunci (Tidak bisa dipercepat/diulang).";
            
            audio.oncontextmenu = (e) => e.preventDefault();
        }).catch(err => {
            // Jika error karena link Google Drive limit, ini akan muncul
            alert("Gagal memutar suara. Hal ini biasanya karena limit akses file atau koneksi internet.");
            console.error(err);
        });

        audio.onended = function() {
            btn.innerHTML = "✅ Selesai";
            msg.style.color = "#27ae60";
            msg.innerText = "Audio telah selesai. Silakan lanjut menjawab.";
            // Hapus referensi agar tidak bisa diputar ulang lewat console
            audio.src = ""; 
        };
    }
}
    
    function setupSecurity() {
    document.addEventListener("visibilitychange", () => {
        // Jika tab disembunyikan dan ujian belum selesai
        if (document.hidden && !isFinished) {
            violations++; // Tetap menghitung di variabel latar belakang

            if (violations >= 3) {
                // Popup jika sudah maksimal
                alert("Batas pelanggaran tercapai! Anda telah berpindah tab sebanyak 3 kali. Jawaban Anda akan dikirim otomatis.");
                submitFinalData();
            } else {
                // Popup peringatan biasa
                alert("PERINGATAN (" + violations + "/3): Dilarang pindah tab atau membuka aplikasi lain!");
            }
        }
    });
}
    
    function calculateCurrentScore() {
        const sec = examData[currentSectionIdx];
        let score = 0;
        sec.keys.forEach((k, i) => {
            const ans = document.querySelector(`input[name="q${i}"]:checked`);
            if (ans && ans.value === k) score++;
        });
        
        if (currentSectionIdx === 0) userScores.listening = score;
        else if (currentSectionIdx === 1) userScores.structure = score;
        else if (currentSectionIdx === 2) userScores.reading = score;
    }

    function submitSection() {
        calculateCurrentScore();
        currentSectionIdx++;
        
        if (currentSectionIdx < examData.length) { 
            alert("Jawaban disimpan. Lanjut ke bagian berikutnya."); 
            renderSection(); 
        } else { 
            submitFinalData();
        }
    }

    async function submitFinalData() {
        isFinished = true; // Mencegah triger violation saat halaman reload nanti
        
        // Buat payload / kumpulan data untuk dioper ke Google Sheet
        const payload = {
            name: userData.name,
            npm: userData.npm,
            kelas: userData.className,
            listening: userScores.listening,
            structure: userScores.structure,
            reading: userScores.reading,
            violations: violations + "x (" + jenisPelanggaranTerakhir + ")"
        };
        
        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
        } catch (e) {
            console.error("Gagal mengirim data:", e);
        }
        
        alert("Ujian Selesai. Data telah berhasil disimpan ke database!"); 
        location.reload(); 
    }
</script>
